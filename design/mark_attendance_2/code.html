<body class="bg-background text-on-background min-h-screen">

</div>
</div>
<div class="flex items-center gap-0 bg-surface-container-lowest border border-outline-variant rounded-xl divide-x divide-outline-variant overflow-hidden">
<div class="px-lg py-md text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase">Total Staff</p>
<p class="font-headline-md text-headline-md text-on-surface">148</p>
</div>
<div class="px-lg py-md text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase">Remaining</p>
<p class="font-headline-md text-headline-md text-primary" id="remaining-count">148</p>
</div>
</div>
</section>
<!-- Section: Filters & Search -->
<section class="mb-lg flex flex-col sm:flex-row gap-md" id="controls-section">
<div class="relative flex-grow">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full pl-xl pr-md py-md bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none font-body-md transition-all" placeholder="Search employees by name or ID..." type="text"/>
</div>
<button class="flex items-center justify-center gap-sm px-lg py-md bg-surface-container-lowest border border-outline-variant rounded-xl hover:bg-surface-container-high transition-colors font-label-md text-label-md">
<span class="material-symbols-outlined">filter_list</span>
                Department: All
            </button>
</section>
<!-- Section: Employee Attendance List -->
<section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-md" id="attendance-list">
<!-- Cards are injected via JS or mapping -->

<div class="flex items-start justify-between">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full overflow-hidden border border-outline-variant bg-surface-container-high">
<img alt="Alex Rivera" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAneWFUa8OedzzDwcFYrYZSwVvIWQ14Od6A9dmdeSmkceLCGhC8vgsmm27ocp245HyEDlLEef-8rpXzPQShqGv_LPb2ZK0KVHb4Q4uuIeauD6vyLbAE3Cwp6DYFlGLyQz5BEJLFAWg1qGy874dz2U9BVPXTDt9Hsm_Qczyv5Nkez3UJYmPGUPihaVruA2WliiplqYZ2YwPdrshh6f1QfY-DbrY7nlrhNA9jOALNu7AH3MUzbDleEsO20h6DXk99GrE3u-Db9CqjnXs"/>

<span class="material-symbols-outlined">person</span>

<!-- UI State & Interaction Scripts -->
<script>
        const employees = [
            { id: "EMP-001", name: "Alex Rivera", role: "Product Designer", dept: "Creative" },
            { id: "EMP-002", name: "Sarah Chen", role: "Senior Engineer", dept: "Technology" },
            { id: "EMP-003", name: "Marcus Thorne", role: "Project Manager", dept: "Operations" },
            { id: "EMP-004", name: "Elena Rodriguez", role: "HR Lead", dept: "People" },
            { id: "EMP-005", name: "Jordan Smith", role: "QA Analyst", dept: "Technology" },
            { id: "EMP-006", name: "Priya Patel", role: "Marketing Specialist", dept: "Growth" },
            { id: "EMP-007", name: "David Kim", role: "DevOps Engineer", dept: "Technology" },
            { id: "EMP-008", name: "Sophie Martin", role: "Content Strategist", dept: "Creative" },
            { id: "EMP-009", name: "James Wilson", role: "Financial Controller", dept: "Finance" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('attendance-list');
            listContainer.innerHTML = ''; // Clear hardcoded placeholder

            employees.forEach(emp => {
                const card = createEmployeeCard(emp);
                listContainer.appendChild(card);
            });

            // Set dynamic date
            const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('current-date').innerText = dateStr;
        });

        function createEmployeeCard(emp) {
            const div = document.createElement('div');
            div.className = "bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-md hover:shadow-lg transition-all group";
            div.innerHTML = `
                <div class="flex items-start justify-between">
                    <div class="flex items-center gap-md">
                        <div class="w-12 h-12 rounded-full overflow-hidden border border-outline-variant bg-surface-container-high">
                            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?ixlib=rb-4.0.3&auto=format&fit=crop&w=120&q=80" alt="${emp.name}" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <p class="font-label-md text-label-md text-on-background font-bold">${emp.name}</p>
                            <p class="font-label-sm text-label-sm text-on-surface-variant">${emp.id}</p>
                        </div>
                    </div>
                    <span class="px-sm py-1 bg-surface-container-high text-on-surface-variant font-label-sm text-[10px] rounded uppercase font-bold tracking-wider">${emp.dept}</span>
                </div>
                <div class="flex gap-sm">
                    <button onclick="toggleAttendance(this, 'present')" class="flex-1 flex items-center justify-center gap-xs py-sm border border-outline-variant rounded-lg font-label-md hover:bg-primary-fixed transition-all active:scale-95">
                        <span class="material-symbols-outlined text-[20px]">check_circle</span> Present
                    </button>
                    <button onclick="toggleAttendance(this, 'absent')" class="flex-1 flex items-center justify-center gap-xs py-sm border border-outline-variant rounded-lg font-label-md hover:bg-error-container transition-all active:scale-95">
                        <span class="material-symbols-outlined text-[20px]">cancel</span> Absent
                    </button>
                </div>
            `;
            return div;
        }

        window.toggleAttendance = (btn, status) => {
            const card = btn.closest('.group');
            const buttons = card.querySelectorAll('button');
            
            // Reset buttons
            buttons.forEach(b => {
                b.className = "flex-1 flex items-center justify-center gap-xs py-sm border border-outline-variant rounded-lg font-label-md transition-all active:scale-95";
            });

            if (status === 'present') {
                btn.className = "flex-1 flex items-center justify-center gap-xs py-sm border border-primary bg-primary text-on-primary rounded-lg font-label-md transition-all scale-[1.02]";
                card.classList.add('border-primary/50', 'bg-primary/5');
            } else {
                btn.className = "flex-1 flex items-center justify-center gap-xs py-sm border border-error bg-error text-on-error rounded-lg font-label-md transition-all scale-[1.02]";
                card.classList.remove('border-primary/50', 'bg-primary/5');
            }

            // Mock update counter
            const marked = document.querySelectorAll('.bg-primary, .bg-error').length;
            document.getElementById('remaining-count').innerText = Math.max(0, 148 - marked);
        };
    </script>
